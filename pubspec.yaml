name: control_asistencia
description: Control de asistencia offline con foto, entrada/salida y modulo admin.
publish_to: 'none'
version: 1.8.11+29

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.4.1
  path: ^1.9.0
  path_provider: ^2.1.5
  image_picker: ^1.1.2
  crypto: ^3.0.6
  intl: ^0.19.0
  share_plus: ^10.1.4
  permission_handler: ^11.4.0
  pdf: ^3.11.3
  archive: ^4.0.7
  file_picker: ^10.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  sqflite_common_ffi: ^2.3.6

flutter:
  uses-material-design: true
